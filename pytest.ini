[pytest]
# Generate a self-contained HTML report on every run and show live logs so the
# router's hostname / uptime are visible in the terminal during the demo.
addopts = -v -ra --html=qa_report.html --self-contained-html

testpaths = .
python_files = test_*.py

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S

markers =
    connectivity: NETCONF session / transport establishment tests
    manageability: NETCONF / YANG capability discovery tests
    config: running-configuration validation tests
    operational: live operational-state (YANG oper model) tests
